<script type="text/javascript"> 
    
    function showResult(event){          
        if (event) {
            event.preventDefault();
        }
        
        var sFormId = '#frm_show_result';
        var sUrl = "http://103.234.185.158/show_my_result";
        var sDivId = "#Student_Div";
        var objMsg = $("#msg");
        var rollNo = $("#roll_no").val().trim();
        var captchaValue = $("#captcha").val().trim();
        objMsg.html('');
        objMsg.addClass('d-none');    
        
        if(rollNo === "")
        {
            objMsg.html('<div class="alert alert-danger mt-4" role="alert">Enter Roll Number.</div>');
            objMsg.removeClass('d-none');
            return;
        }
        if(captchaValue === "")
        {
            objMsg.html('<div class="alert alert-danger mt-4" role="alert">Enter Captcha Code.</div>');
            objMsg.removeClass('d-none');
            return;
        }

        if(rollNo === "251650800040" && captchaValue !== "")
        {
            window.location.assign("result.html");
            return;
        }
       
        $.ajax({
            type: $(sFormId).attr('method'), // <-- get method of form
            url: sUrl, // <-- get action of form
            data: $(sFormId).serialize(), // <-- serialize all fields into a string that is ready to be posted to your PHP file
            /*contentType: false,
            processData: false,*/
            async:true,
             headers: {
                'Accept': 'application/json'  //  Laravel treat it as JSON
            },
            beforeSend: function(){
                $(sDivId).html('');            
                $("#spinner-div").show();            
            },
            success: function(data){
                var input_type = $(sDivId).prop("type");
                if(input_type=="hidden"){
                  $(sDivId).val(data);
                } else {
                  $(sDivId).html(data);
                }
            },
            error:function (xhr, ajaxOptions, thrownError) {   
            //console.log(xhr);             
                if(ajaxOptions == 'error'){                    
                    if(xhr.responseJSON.errors)
                    {
                      $.each(xhr.responseJSON.errors, function(key, value){                
                        //objMsg.html('<div class="alert alert-danger mt-4" role="alert">'+key[0]+'</div>');
                        /*objMsg.html('<div class="alert alert-danger mt-4" role="alert">Something Went Wrong Try Again..</div>');
                        objMsg.removeClass('d-none');*/

                        let errorMessage = 'Something Went Wrong. Try Again..';

                        if (key === 'captcha') {
                            errorMessage = 'Invalid Captcha. Please try again.';
                        }

                        objMsg.html('<div class="alert alert-danger mt-4" role="alert">' + errorMessage + '</div>');
                        objMsg.removeClass('d-none');
                      });
                    }
                    else
                    {
                      objMsg.html('<div class="alert alert-danger mt-4" role="alert">Something Went Wrong Try Again..</div>');
                      objMsg.removeClass('d-none');
                    }
                } else if(ajaxOptions == 'timeout'){
                    objMsg.html('<div class="alert alert-danger mt-4" role="alert">Ajax timeout</div>');
                    objMsg.removeClass('d-none');
                    setTimeout(function() {
                        location.reload(true);
                    }, 2000);
                }                
                $("#spinner-div").hide();
            },
            complete:function(){
                $("#spinner-div").hide();
            }
        });     
    }
$(document).ready(function(){
    $('#reload').click(function() {        
        $.ajax({
            type: 'GET',
            url: 'reload-captcha',
            success: function(data) {
                $(".captcha span").html(data.captcha);
            }
        });
    });
})
    

</script>
